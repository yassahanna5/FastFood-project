<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restaurant Register</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="toast-zone" id="toastZone"></div>
    <div class="auth-wrapper">
      <div class="auth-card row g-0">
        <div class="col-lg-6 left-panel">
          <p class="brand mb-1">CRIS Restaurant</p>
          <h2 class="fw-bold mb-1">Create Restaurant Account</h2>
          <p class="subtitle mb-4">Start managing your fast-food business like global websites.</p>

          <form id="registerForm" class="needs-validation" novalidate>
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">First Name</label>
                <input class="form-control" id="firstName" required />
              </div>
              <div class="col-md-6">
                <label class="form-label">Last Name</label>
                <input class="form-control" id="lastName" required />
              </div>
              <div class="col-12">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" id="email" required />
              </div>
              <div class="col-12">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" id="password" required />
                <div class="form-text form-text-small">
                  Minimum 8 chars + uppercase + lowercase + number + special character.
                </div>
                <div class="strength-box">
                  <div class="strength-bar">
                    <div class="strength-fill" id="strengthFill"></div>
                  </div>
                  <div class="strength-label" id="strengthLabel">Strength: -</div>
                </div>
              </div>
              <div class="col-12">
                <label class="form-label">Repeat Password</label>
                <input type="password" class="form-control" id="repeatPassword" required />
                <div class="form-text text-danger" id="matchMsg"></div>
              </div>
            </div>

            <button
              type="submit"
              class="btn btn-accent w-100 mt-4"
              data-bs-toggle="tooltip"
              data-bs-title="Create your new account"
            >
              Register
            </button>

            <p class="mt-3 mb-0 text-center subtitle">
              Already have an account?
              <a href="/login.html" class="link-btn" data-bs-toggle="tooltip" data-bs-title="Go to Login page">Login</a>
            </p>
          </form>
        </div>

        <div class="col-lg-6 d-none d-lg-block food-side">
          <div class="food-overlay">Fresh food. Fast service. Better UX.</div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
