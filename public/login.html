<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
<div class="toast-zone" id="toastZone"></div>
<div class="auth-wrapper"><div class="auth-card row g-0"><div class="col-lg-6 left-panel">
  <p class="brand mb-1">King Food Restaurant</p><h2 class="fw-bold mb-1">Welcome Back</h2>
  <form id="loginForm">
    <div class="mb-3"><label class="form-label">Email</label><input type="email" class="form-control" id="loginEmail" required /></div>
    <div class="mb-3"><label class="form-label">Password</label><div class="input-group"><input type="password" class="form-control" id="loginPassword" required /><button class="btn btn-outline-secondary toggle-pass" type="button" data-target="loginPassword"><i class="bi bi-eye"></i></button></div></div>
    <div class="d-flex justify-content-between align-items-center mb-3"><div class="form-check"><input class="form-check-input" type="checkbox" id="rememberMe" /><label class="form-check-label" for="rememberMe">Remember me</label></div><a href="/forgot-password.html">Forgot password?</a></div>
    <button type="submit" class="btn btn-accent w-100" data-bs-toggle="tooltip" data-bs-title="Login">Login</button>
    <p class="mt-3 mb-0 text-center subtitle">New user? <a href="/register.html" class="link-btn">Create Account</a></p>
  </form>
</div><div class="col-lg-6 d-none d-lg-block food-side"><div class="food-overlay">Your dashboard starts here.</div></div></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/app.js"></script>
</body>
</html>
