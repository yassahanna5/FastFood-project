<!doctype html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Book Table</title><link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css' rel='stylesheet'></head><body class='p-3'><a href='/home.html' class='btn btn-secondary'>Home</a><h2>Book Table</h2><form id='bookForm' class='w-50'><input id='bn' class='form-control mb-2' placeholder='Full Name' required><input id='be' type='email' class='form-control mb-2' placeholder='Email' required><input id='bp' class='form-control mb-2' placeholder='Phone'><input id='bd' type='date' class='form-control mb-2' required><input id='bt' type='time' class='form-control mb-2' required><select id='bg' class='form-select mb-2'><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option></select><textarea id='br' class='form-control mb-2' placeholder='Requests'></textarea><button class='btn btn-danger'>Confirm Booking</button></form><script>bookForm.onsubmit=async(e)=>{e.preventDefault();await fetch('/api/user/bookings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({fullName:bn.value,email:be.value,phone:bp.value,date:bd.value,time:bt.value,guests:bg.value,requests:br.value})});alert('Booking saved in MongoDB');}</script></body></html>
