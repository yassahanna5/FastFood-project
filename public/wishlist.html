<!doctype html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Wishlist</title><link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css' rel='stylesheet'></head><body class='p-3'><a href='/home.html' class='btn btn-secondary mb-2'>Home</a><h2>My Wishlist</h2><div id='wishList'></div><script>async function load(){const d=await fetch('/api/user/wishlist').then(r=>r.json());wishList.innerHTML=d.map(p=>`<div class='card p-2 mb-2'>${p.name} - $${p.price} <button onclick='add("${p._id}")' class='btn btn-sm btn-dark'>Add to cart</button></div>`).join('')}window.add=async(id)=>{await fetch('/api/user/cart',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({productId:id,qty:1})});location.href='/cart.html'};load();</script></body></html>
