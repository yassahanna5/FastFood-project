<!doctype html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Notifications</title><link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css' rel='stylesheet'></head><body class='p-3'><a href='/home.html' class='btn btn-secondary mb-2'>Home</a><h2>Notifications</h2><div id='nots'></div><script>fetch('/api/user/notifications').then(r=>r.json()).then(d=>{nots.innerHTML=d.map(n=>`<div class='card p-2 mb-2'><b>${n.type}</b> ${n.title}<br>${n.message}</div>`).join('')})</script></body></html>
