<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
<div class="toast-zone" id="toastZone"></div>
<div class="auth-wrapper"><div class="auth-card row g-0"><div class="col-lg-6 left-panel">
<p class="brand mb-1">King Food Restaurant</p><h2 class="fw-bold mb-1">Reset Password</h2>
<form id="forgotForm" class="mb-4"><label class="form-label">Email</label><input type="email" class="form-control mb-3" id="forgotEmail" required /><button type="submit" class="btn btn-accent w-100">Send Reset Code</button></form>
<hr />
<form id="resetForm">
<div class="mb-2"><label class="form-label">Email</label><input type="email" class="form-control" id="resetEmail" required /></div>
<div class="mb-2"><label class="form-label">Reset Code</label><input class="form-control" id="resetCode" required /></div>
<div class="mb-2"><label class="form-label">New Password</label><div class="input-group"><input type="password" class="form-control" id="newPassword" required /><button class="btn btn-outline-secondary toggle-pass" type="button" data-target="newPassword"><i class="bi bi-eye"></i></button></div></div>
<div class="mb-3"><label class="form-label">Repeat New Password</label><div class="input-group"><input type="password" class="form-control" id="repeatNewPassword" required /><button class="btn btn-outline-secondary toggle-pass" type="button" data-target="repeatNewPassword"><i class="bi bi-eye"></i></button></div></div>
<button type="submit" class="btn btn-accent w-100">Update Password</button>
</form>
<p class="mt-3 mb-0 text-center subtitle">Back to <a href="/login.html" class="link-btn">Login</a></p>
</div><div class="col-lg-6 d-none d-lg-block food-side"><div class="food-overlay"></div></div></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/app.js"></script>
</body></html>
