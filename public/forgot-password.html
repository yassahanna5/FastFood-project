<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot & Reset Password</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="toast-zone" id="toastZone"></div>
    <div class="auth-wrapper">
      <div class="auth-card row g-0">
        <div class="col-lg-6 left-panel">
          <p class="brand mb-1">CRIS Restaurant</p>
          <h2 class="fw-bold mb-1">Reset Password</h2>
          <p class="subtitle mb-4">Step 1: enter your email to receive reset code.</p>

          <form id="forgotForm" class="mb-4">
            <label class="form-label">Email</label>
            <input type="email" class="form-control mb-3" id="forgotEmail" required />
            <button type="submit" class="btn btn-accent w-100" data-bs-toggle="tooltip" data-bs-title="Send reset code">
              Send Reset Code
            </button>
          </form>

          <hr />

          <p class="subtitle mb-3">Step 2: enter code and set new password.</p>
          <form id="resetForm">
            <div class="mb-2">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" id="resetEmail" required />
            </div>
            <div class="mb-2">
              <label class="form-label">Reset Code</label>
              <input class="form-control" id="resetCode" required />
            </div>
            <div class="mb-2">
              <label class="form-label">New Password</label>
              <input type="password" class="form-control" id="newPassword" required />
            </div>
            <div class="mb-3">
              <label class="form-label">Repeat New Password</label>
              <input type="password" class="form-control" id="repeatNewPassword" required />
            </div>

            <button type="submit" class="btn btn-accent w-100" data-bs-toggle="tooltip" data-bs-title="Update password now">
              Update Password
            </button>
          </form>

          <p class="mt-3 mb-0 text-center subtitle">
            Back to
            <a href="/login.html" class="link-btn" data-bs-toggle="tooltip" data-bs-title="Go to login">Login</a>
          </p>
        </div>

        <div class="col-lg-6 d-none d-lg-block food-side">
          <div class="food-overlay">Secure password recovery flow.</div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
