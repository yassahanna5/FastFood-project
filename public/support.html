<!doctype html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Support</title><link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css' rel='stylesheet'></head><body class='p-3'><a href='/home.html' class='btn btn-secondary'>Home</a><h2>Help & Support</h2><p>Call us: 01016447253 | Email: ayhwanna@gmail.com</p><div class='accordion' id='faq'><div class='accordion-item'><h2 class='accordion-header'><button class='accordion-button' data-bs-toggle='collapse' data-bs-target='#o'>Orders</button></h2><div id='o' class='accordion-collapse collapse show'><div class='accordion-body'>Track in My Orders.</div></div></div><div class='accordion-item'><h2 class='accordion-header'><button class='accordion-button' data-bs-toggle='collapse' data-bs-target='#p'>Payment</button></h2><div id='p' class='accordion-collapse collapse'><div class='accordion-body'>Cards are saved securely.</div></div></div></div><h4 class='mt-3'>Chat</h4><div id='chatBox' style='height:220px;overflow:auto;border:1px solid #ddd' class='p-2 mb-2'></div><input id='chatMsg' class='form-control mb-2' placeholder='message'><input id='chatImg' type='file' class='form-control mb-2'><button id='sendChat' class='btn btn-danger'>Send</button><script src='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js'></script><script>const toB=f=>new Promise(r=>{const fr=new FileReader();fr.onload=()=>r(fr.result);fr.readAsDataURL(f)});async function load(){const d=await fetch('/api/user/conversations').then(r=>r.json());chatBox.innerHTML=d.map(m=>`<div><b>${m.senderRole}:</b> ${m.message||''} ${m.imageUrl?`<img src='${m.imageUrl}' width='60'>`:''}</div>`).join('');chatBox.scrollTop=1e6;}sendChat.onclick=async()=>{let imageUrl='';if(chatImg.files[0]) imageUrl=await toB(chatImg.files[0]);await fetch('/api/user/conversations',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:chatMsg.value,imageUrl})});chatMsg.value='';chatImg.value='';load();};setInterval(load,2000);load();</script></body></html>
