<!doctype html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Food Menu</title><script src='https://cdn.tailwindcss.com'></script><link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css' rel='stylesheet'><link rel='stylesheet' href='/site.css'></head><body><div class='container py-4'><a href='/home.html' class='btn btn-secondary mb-3'>Home</a><h1 class='text-3xl font-bold mb-4'>Global Restaurant Menus</h1><div id='menuCards' class='grid grid-cols-1 md:grid-cols-3 gap-4'></div></div><footer class='footer-kf p-3 text-center'>© 2026 King Food</footer><script src='/site.js'></script><script>fetch('/api/store/products').then(r=>r.json()).then(ps=>{menuCards.innerHTML=ps.slice(0,90).map((p,i)=>`<div class='bg-white rounded-xl shadow p-3 hover:scale-105 transition'><img src='${p.imageUrl||p.category?.imageUrl||"https://images.unsplash.com/photo-1546069901-ba9599a7e63c?auto=format&fit=crop&w=800&q=60"}' class='w-full h-44 object-cover rounded'><h3 class='font-bold mt-2'>${p.name}</h3><p class='text-sm text-gray-600'>${p.description||''}</p><div class='font-semibold'>$${p.price}</div><span class='inline-block px-2 py-1 bg-red-500 text-white rounded mt-1'>Special Offer</span></div>`).join('')})</script></body></html>
