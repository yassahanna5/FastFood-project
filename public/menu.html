<!doctype html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Menu</title><script src='https://cdn.tailwindcss.com'></script><link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css' rel='stylesheet'><link rel='stylesheet' href='/site.css'></head><body><a href='/home.html' class='btn btn-secondary m-2'>Home</a><section class='p-6'><h1 class='text-3xl font-bold mb-4'>Restaurant Menus</h1><div id='menuCards' class='grid md:grid-cols-3 gap-4'></div></section><script>fetch('/api/store/products').then(r=>r.json()).then(ps=>{const g=document.getElementById('menuCards');g.innerHTML=ps.slice(0,30).map(p=>`<div class='bg-white rounded-xl shadow p-3 hover:scale-105 transition'><img src='${p.imageUrl||"https://via.placeholder.com/300"}' class='w-full h-40 object-cover rounded'><h3 class='font-bold mt-2'>${p.name}</h3><div>$${p.price}</div><span class='badge bg-danger'>Offer</span></div>`).join('')})</script></body></html>
